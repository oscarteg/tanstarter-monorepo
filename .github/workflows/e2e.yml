name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The app suite boots the real SSR server, so it needs a database.
    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tanstarter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanstarter"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/tanstarter
      BETTER_AUTH_SECRET: e2e-secret-not-for-production-min-32-chars
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # The app suite signs up a real user, so the schema has to exist.
      - name: Apply migrations
        run: pnpm db migrate

      # Playwright builds and serves both apps itself (see webServer in
      # playwright.config.ts) — nothing needs to be deployed first.
      - name: E2E
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
