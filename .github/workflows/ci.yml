name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Format, lint, test, build
    runs-on: ubuntu-latest
    # No database service: none of these steps connect to one. The build only
    # bundles (it never evaluates the db client) and the tests are unit-level.
    # Add Postgres back here when a step actually needs it — the E2E job is the
    # place that will, since it boots the app for real.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Astro's generated types (astro:content) live in the gitignored .astro/
      # directory, so a fresh clone has none — generate them before typecheck.
      - name: Generate Astro types
        run: pnpm --filter @repo/marketing sync

      - name: Format check
        run: pnpm run format:check

      - name: Lint + typecheck
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  publish:
    name: Build & publish image to ghcr
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Emulation for the arm64 leg (the runner is amd64).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          # amd64 for servers, arm64 so the image also runs on Apple Silicon.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
